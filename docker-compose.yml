version: "3.8"

services:
  # AREval API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8700:8700"
    environment:
      - AREVAL_PROFILE=auto
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./.areval:/app/.areval
    command: uvicorn areval_api.main:app --host 0.0.0.0 --port 8700 --reload

  # Dashboard — run locally instead: areval dashboard --port 3000
